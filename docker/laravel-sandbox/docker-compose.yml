version: "3.9"

# docker-compose.yml — Laravel Sandbox Image Build
# Used for building and locally testing the sandbox image.
# The FastAPI coordinator manages individual container lifecycles via docker-py directly.
# Containers run with --network=none so MySQL/Redis are never reachable anyway.

networks:
  repair-net:
    driver: bridge

services:
  # ── PHP / Laravel Sandbox ──────────────────────────────────────────────────
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-sandbox:latest
    container_name: laravel-sandbox
    networks:
      - repair-net
    cpus: "0.5"
    mem_limit: 512m
    pids_limit: 64
    security_opt:
      - no-new-privileges:true
    read_only: false
